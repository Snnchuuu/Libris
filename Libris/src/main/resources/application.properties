# Spring Boot uygulama yapılandırması

# Static kaynaklar (CSS, JS, resimler) için cache kapatıldı.
# Geliştirme sırasında değişikliklerin tarayıcıda hemen görünmesi için.
# Production'da bu satır kaldırılabilir.
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true

# Vaadin development mode özellikleri
vaadin.frontend.hotdeploy=true
vaadin.devmode.liveReload.enabled=true
